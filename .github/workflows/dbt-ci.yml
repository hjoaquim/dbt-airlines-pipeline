name: dbt CI

on:
  pull_request:
    branches: [main]

env:
  DBT_PROFILES_DIR: ./
  DBT_TARGET: ci

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install sqlfluff

      - name: "Gate 1 -- Lint SQL"
        run: sqlfluff lint models/ tests/ --dialect postgres

      - name: "Gate 2 -- Compile and run modified models"
        run: echo "Gate 2: PASSED (demo mode -- requires database connection)"

      - name: "Gate 3 -- Check source freshness"
        run: echo "Gate 3: PASSED (demo mode -- requires database connection)"

      - name: "Gate 4 -- Run tests on modified models"
        run: echo "Gate 4: PASSED (demo mode -- requires database connection)"
