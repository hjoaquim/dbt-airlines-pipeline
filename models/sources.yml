version: 2

sources:
  - name: airlines_raw
    description: Raw airline operations data
    schema: raw
    freshness:
      warn_after:
        count: 24
        period: hour
      error_after:
        count: 48
        period: hour
    loaded_at_field: _loaded_at
    tables:
      - name: airports
        description: US airport reference data
      - name: airlines
        description: Airline carrier reference data
      - name: flights
        description: Individual flight records with delay and cancellation data
